services:
  camerapref:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"    # Backend API
    environment:
      - PORT=3000
      - NODE_ENV=production
    env_file:
      - backend/.env
    volumes:
      - uploads:/app/backend/uploads
      - logs:/app/backend/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  uploads:
  logs:
